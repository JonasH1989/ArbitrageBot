version: '3.8'

services:
  # MPC Arbitrage Bot (Multi-Pair)
  arbitrage-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: mpc-arbitrage-bot
    restart: unless-stopped
    ports:
      - "8504:8504"
      - "192.168.113.14:8504:8504"
    volumes:
      - arb-config:/app/config
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Berlin
    command: ["python", "arb_autotrade.py"]

  # Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: mpc-arbitrage-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
      - "192.168.113.14:8502:8501"
    volumes:
      - arb-config:/app/config

volumes:
  arb-config:
