version: '3.8'

services:
  # MPC Arbitrage Bot (Multi-Pair)
  arbitrage-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: mpc-arbitrage-bot
    restart: unless-stopped
    ports:
      - "192.168.113.14:18888:8505"
    volumes:
      - arb-config:/app/config
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Berlin
    command: ["python", "arb_autotrade.py"]

  # Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: mpc-arbitrage-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
      - "192.168.113.14:8502:8501"
    volumes:
      - arb-config:/app/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8501/_stcore/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  arb-config:
